# Site settings
title_en: "Urban Monitoring Mburicao"
title_es: "Monitoreo Urbano Mburicao"
title_separator: "|"
name: "Cuencas Urbanas Mburicao"
description_en: "Participatory hydrological monitoring system for Arroyo Mburicao..."
description_es: "Sistema de monitoreo hidrológico participativo..."

# URL configuration
url: "https://mburicaocastai.github.io"
baseurl: "/v1"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Theme (personalizado)
theme: minima # Base, luego personalizamos
# Si prefieres un tema ya hecho, descomenta:
# remote_theme: "mmistakes/minimal-mistakes"

# Custom variables
grafana_url: "http://200.10.231.202:3000"

# Navigation
navigation:
  - title: "Home"
    url: "/"
  - title: "Real Time Forecasting"
    url: "/pages/real-time-forecasting/"
  - title: "Historical Data & Predictions"
    url: "/pages/historical-data/"
  - title: "Hydrological Monitoring"
    url: "/pages/hydrological-monitoring/"
  - title: "Rainfall Monitoring"
    url: "/pages/rainfall-monitoring/"
  - title: "3D Map"
    url: "/pages/3d-map/"
  - title: "Registrations"
    url: "/pages/registrations/"
  - title: "About Us"
    url: "/pages/about/"

# Collection for citizen science
collections:
  reports:
    output: true
    permalink: /reports/:path/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default-bilingual"
      lang: "en"
  - scope:
      path: "index-home.md"
    values:
      layout: "home-bilingual"
      lang: "en"
  - scope:
      path: "pages_es/"
    values:
      layout: "default-bilingual"
      lang: "es"
  - scope:
      path: "pages_es/index.md"
    values:
      layout: "home-bilingual"
      lang: "es"

# Title
title:
  {% if page.lang == "es" %}
    {{ page.title | default: site.title_es }}
  {% else %}
    {{ page.title | default: site.title_en }}
  {% endif %}